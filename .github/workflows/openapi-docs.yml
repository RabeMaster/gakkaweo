name: OpenAPI Docs

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docs-site/**'
  workflow_dispatch:

concurrency:
  group: openapi-docs
  cancel-in-progress: true

jobs:
  deploy:
    name: Generate & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gakkaweo
          POSTGRES_USER: ci-dummy
          POSTGRES_PASSWORD: ci-dummy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Generate OpenAPI docs
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ci-dummy
          DB_PASSWORD: ci-dummy
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_ACCESS_SECRET: Y2ktZHVtbXktand0LXNlY3JldC1rZXktZm9yLW9wZW5hcGktZG9jcy1nZW5lcmF0aW9u
          SEED_ADMIN_PASSWORD: ci-dummy-pw
          APP_OPENAPI_DOCS_MODE: true
          OAUTH_KAKAO_CLIENT_ID: ci-dummy
          OAUTH_KAKAO_CLIENT_SECRET: ci-dummy
          OAUTH_GOOGLE_CLIENT_ID: ci-dummy
          OAUTH_GOOGLE_CLIENT_SECRET: ci-dummy
          OAUTH_NAVER_CLIENT_ID: ci-dummy
          OAUTH_NAVER_CLIENT_SECRET: ci-dummy
        run: |
          chmod +x gradlew
          ./gradlew generateOpenApiDocs

      - name: Prepare deploy
        run: |
          cp backend/build/openapi/openapi-full.json docs-site/openapi-full.json

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-site
