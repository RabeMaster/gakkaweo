# gakkaweo.r4b2.xyz - Frontend (SPA 정적 서빙)
server {
    listen 80;
    server_name gakkaweo.r4b2.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name gakkaweo.r4b2.xyz;

    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    root /home/ravendope/gakkaweo/frontend/dist;
    index index.html;

    # SPA 라우팅: 존재하지 않는 경로는 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    # sitemap.xml MIME type
    location = /sitemap.xml {
        default_type application/xml;
    }

    # 정적 자산 캐싱 (Vite 해시 파일명)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
