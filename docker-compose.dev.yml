x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgresql:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: gakkaweo
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: UTC
    command: postgres -c timezone=UTC
    logging: *logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d gakkaweo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redisdata:/data
    environment:
      TZ: UTC
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy volatile-lru
      --requirepass ${REDIS_PASSWORD}
    logging: *logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./ai-service
    ports:
      - "127.0.0.1:${AI_SERVICE_PORT:-8000}:8000"
    volumes:
      - hf-model-cache:/root/.cache/huggingface
    environment:
      TZ: UTC
    deploy:
      resources:
        limits:
          memory: 2G
    logging: *logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

volumes:
  pgdata:
    name: gakkaweo-postgresql
  redisdata:
    name: gakkaweo-redis
  hf-model-cache:
    name: gakkaweo-hf-model-cache