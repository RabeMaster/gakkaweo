spring:
  application:
    name: gakkaweo-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/gakkaweo?stringtype=unspecified
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jackson:
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 2MB
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${OAUTH_KAKAO_CLIENT_ID}
            client-secret: ${OAUTH_KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: account_email
            client-name: Kakao
          google:
            client-id: ${OAUTH_GOOGLE_CLIENT_ID}
            client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope: email
            client-name: Google
          naver:
            client-id: ${OAUTH_NAVER_CLIENT_ID}
            client-secret: ${OAUTH_NAVER_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope: email
            client-name: Naver
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  access-secret: ${JWT_ACCESS_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:30m}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:7d}

cookie:
  secure: ${COOKIE_SECURE:false}

app:
  oauth2:
    authorized-redirect-uri: ${OAUTH_REDIRECT_URI:http://localhost:3000}
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:${AI_SERVICE_PORT:8000}}
    timeout: ${AI_SERVICE_TIMEOUT:3s}
  game:
    similarity-threshold: ${SIMILARITY_THRESHOLD:95.0}
  upload:
    profile-dir: ${UPLOAD_PROFILE_DIR:./uploads/profiles}
  rate-limit:
    guess-per-minute: ${RATE_LIMIT_GUESS:40}
    read-per-minute: ${RATE_LIMIT_READ:60}
    sse-per-minute: ${RATE_LIMIT_SSE:10}
    auth-per-minute: ${RATE_LIMIT_AUTH:10}
    admin-per-minute: ${RATE_LIMIT_ADMIN:120}
    bucket-expiry-minutes: ${RATE_LIMIT_BUCKET_EXPIRY:10}
    cleanup-interval-ms: ${RATE_LIMIT_CLEANUP_INTERVAL_MS:300000}

resilience4j:
  circuitbreaker:
    instances:
      aiService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

logging:
  level:
    com.gakkaweo.backend: ${LOG_LEVEL:DEBUG}

server:
  port: ${SERVER_PORT:8080}
