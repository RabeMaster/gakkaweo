spring:
  application:
    name: gakkaweo-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT}/gakkaweo?stringtype=unspecified
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

jwt:
  access-secret: ${JWT_ACCESS_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:30m}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:7d}

cookie:
  secure: ${COOKIE_SECURE:false}

server:
  port: 8080
